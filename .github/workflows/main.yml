name: Run Preprocessing Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # Memunculkan tombol "Run workflow" manual di GitHub Actions

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Ambil semua file dari repositori
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Setup environment Python versi 3.10
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # Step 3: Proses instalasi library langsung (Tanpa membaca file requirements.txt)
    - name: Install Dependencies Directly
      run: |
        python -m pip install --upgrade pip
        pip install numpy pandas matplotlib seaborn scikit-learn plotly yellowbrick kagglehub

    # Step 4: Jalankan skrip otomasi preprocessing Anda
    - name: Run Preprocessing Script
      run: python preprocessing/automate_Srie_Wahyudhanis_Hadis.py

    # Step 5: Kirim balik file data_preprocessing.csv ke GitHub jika berhasil terbentuk
    - name: Commit and Push Preprocessed Data
      run: |
        git config --global user.name "ririhadis"
        git config --global user.email "sriewahyudhanis.hadis@gmail.com"
        
        if [ -f data_preprocessing.csv ]; then
          git add data_preprocessing.csv
          # [skip ci] digunakan agar proses push balik ini tidak memicu looping workflow berulang-ulang
          git commit -m "Automated update: data_preprocessing.csv [skip ci]" || echo "Tidak ada perubahan data baru"
          git push origin main
        else
          echo "Eror: File data_preprocessing.csv gagal dibuat oleh skrip!"
          exit 1
        fi
